---
- name: Create node exporter user
  ansible.builtin.user:
    name: node_exporter
    shell: /sbin/nologin
    create_home: false
    state: present

- name: Download Node Exporter
  ansible.builtin.get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz"
    dest: /tmp/node_exporter.tar.gz

- name: Extract Node Exporter
  ansible.builtin.unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /tmp/
    remote_src: true

- name: Copy Node Exporter binary
  ansible.builtin.copy:
    src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-amd64/node_exporter"
    dest: /usr/local/bin/node_exporter
    owner: node_exporter
    group: node_exporter
    mode: '0755'
    remote_src: true

- name: Create Node Exporter systemd service
  ansible.builtin.copy:
    dest: /etc/systemd/system/node_exporter.service
    content: |
      [Unit]
      Description=Node Exporter
      After=network.target

      [Service]
      User=node_exporter
      ExecStart=/usr/local/bin/node_exporter

      [Install]
      WantedBy=multi-user.target

- name: Start and enable Node Exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: started
    enabled: true
    daemon_reload: true

- name: Run Prometheus container
  ansible.builtin.command: >
    docker run -d
    --name prometheus
    --restart unless-stopped
    -p 9090:9090
    {{ prometheus_image }}
  changed_when: true

- name: Run Grafana container
  ansible.builtin.command: >
    docker run -d
    --name grafana
    --restart unless-stopped
    -p 3000:3000
    {{ grafana_image }}
  changed_when: true
- name: Create alertmanager config directory
  ansible.builtin.file:
    path: /etc/alertmanager
    state: directory
    mode: '0755'

- name: Deploy alertmanager config from vault
  ansible.builtin.template:
    src: alertmanager.yml.j2
    dest: /etc/alertmanager/alertmanager.yml
    mode: '0640'

- name: Run Alertmanager container
  ansible.builtin.command: >
    docker run -d
    --name alertmanager
    --restart unless-stopped
    -p 9093:9093
    -v /etc/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    prom/alertmanager
  changed_when: true
- name: Remove existing Prometheus container if present
  ansible.builtin.command: docker rm -f prometheus
  register: remove_prometheus
  failed_when: false
  changed_when: remove_prometheus.rc == 0

- name: Run Prometheus container
  ansible.builtin.command: >
    docker run -d
    --name prometheus
    --restart unless-stopped
    -p 9090:9090
    prom/prometheus:latest
  changed_when: true

- name: Remove existing Grafana container if present
  ansible.builtin.command: docker rm -f grafana
  register: remove_grafana
  failed_when: false
  changed_when: remove_grafana.rc == 0

- name: Run Grafana container
  ansible.builtin.command: >
    docker run -d
    --name grafana
    --restart unless-stopped
    -p 3000:3000
    grafana/grafana:latest
  changed_when: true

- name: Remove existing Alertmanager container if present
  ansible.builtin.command: docker rm -f alertmanager
  register: remove_alertmanager
  failed_when: false
  changed_when: remove_alertmanager.rc == 0

- name: Run Alertmanager container
  ansible.builtin.command: >
    docker run -d
    --name alertmanager
    --restart unless-stopped
    -p 9093:9093
    -v /etc/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    prom/alertmanager
  changed_when: true
